services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kryschendo
      POSTGRES_USER: kryschendo_user
      POSTGRES_PASSWORD: localdevpassword  # local dev only — never used in production
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kryschendo_user -d kryschendo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
