{% extends "main/base.html" %}
{% load static %}

{% block title %}QR Code — Kryschendo{% endblock %}

{% block extra_head %}
<style>
  @media print {
    nav, footer, .no-print { display: none !important; }
    body { background: white !important; }
    .print-card { box-shadow: none !important; border: none !important; }
  }
</style>
{% endblock %}

{% block content %}
<section class="pt-32 pb-16 md:pt-40 md:pb-20 bg-gradient-to-b from-teal to-teal-dark no-print">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
    <p class="text-gold text-sm tracking-[0.3em] uppercase mb-4 fade-in-up">Share</p>
    <h1 class="font-heading text-4xl md:text-5xl font-semibold text-white mb-6 fade-in-up">QR Code</h1>
    <div class="section-divider fade-in-up"></div>
  </div>
</section>

<section class="py-16 md:py-24 bg-warm">
  <div class="max-w-lg mx-auto px-4 sm:px-6 text-center">
    <div class="bg-white rounded-2xl p-10 shadow-sm border border-cream print-card fade-in-up">
      <h2 class="font-heading text-2xl font-semibold text-teal mb-2">Kryschendo</h2>
      <p class="text-near-black/60 text-sm mb-8">Scan to visit the website</p>

      <img src="{% static 'main/images/qr_code.png' %}" alt="QR code for Kryschendo website" class="w-64 h-64 mx-auto mb-8">

      <p class="text-near-black/50 text-xs mb-6">kryschendo.com</p>

      <div class="flex flex-col sm:flex-row gap-3 justify-center no-print">
        <a href="{% static 'main/images/qr_code.png' %}" download="kryschendo-qr-code.png"
           class="bg-teal hover:bg-teal-dark text-white px-6 py-3 rounded-lg font-semibold tracking-wider uppercase text-sm text-center transition-all duration-300">
          Download
        </a>
        <button onclick="window.print()"
                class="border-2 border-teal text-teal hover:bg-teal hover:text-white px-6 py-3 rounded-lg font-semibold tracking-wider uppercase text-sm text-center transition-all duration-300">
          Print
        </button>
      </div>
    </div>
  </div>
</section>
{% endblock %}
